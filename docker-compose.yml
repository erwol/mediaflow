services:
  backend:
    build:
      context: ./backend
      target: base
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
      - /home/pi/movies:/home/pi/movies
      - /home/pi/tvshows:/home/pi/tvshows
    environment:
      - MOVIES_DIR=/home/pi/movies
      - TVSHOWS_DIR=/home/pi/tvshows
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      target: build
    command: npm run dev -- --host
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    depends_on:
      - backend
